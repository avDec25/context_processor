<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #ddd;
            background: #fafafa;
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .prompt-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .prompt-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .prompt-item:hover {
            background: #f5f5f5;
        }

        .prompt-item.active {
            background: #e3f2fd;
            border-color: #2196f3;
        }

        .prompt-item-key {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .prompt-item-desc {
            font-size: 12px;
            color: #666;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .editor-header {
            padding: 20px;
            border-bottom: 1px solid #ddd;
            background: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-title {
            display: flex;
            flex-direction: column;
        }

        .editor-title h2 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .editor-title .meta {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2196f3;
            color: white;
        }

        .btn-primary:hover {
            background: #1976d2;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #fff;
            color: #666;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .editor-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .editor-textarea {
            width: 100%;
            height: 100%;
            min-height: 400px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .editor-textarea:focus {
            border-color: #2196f3;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #666;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: #4caf50;
            color: white;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .notification.error {
            background: #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .char-count {
            text-align: right;
            margin-top: 8px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Prompts</h1>
            </div>
            <div class="prompt-list" id="promptList">
                <div class="loading">Loading prompts...</div>
            </div>
        </div>

        <div class="editor-panel">
            <div class="editor-header" id="editorHeader" style="display: none;">
                <div class="editor-title">
                    <h2 id="promptKey"></h2>
                    <div class="meta">
                        <span id="promptDesc"></span>
                        <span id="promptUpdated"></span>
                    </div>
                </div>
                <div class="editor-actions">
                    <button class="btn btn-secondary" id="revertBtn">Revert</button>
                    <button class="btn btn-primary" id="saveBtn" disabled>Save Changes</button>
                </div>
            </div>

            <div class="editor-content" id="editorContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <p>Select a prompt to edit</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let prompts = [];
        let currentPrompt = null;
        let originalText = '';
        let isDirty = false;

        // Fetch and display all prompts
        async function loadPrompts() {
            try {
                const response = await fetch('/prompts');
                prompts = await response.json();
                renderPromptList();
            } catch (error) {
                showNotification('Failed to load prompts', 'error');
                console.error('Error loading prompts:', error);
            }
        }

        function renderPromptList() {
            const listEl = document.getElementById('promptList');

            if (prompts.length === 0) {
                listEl.innerHTML = '<div class="loading">No prompts found</div>';
                return;
            }

            listEl.innerHTML = prompts.map(prompt => `
                <div class="prompt-item" data-key="${prompt.key}" onclick="selectPrompt('${prompt.key}')">
                    <div class="prompt-item-key">${prompt.key}</div>
                    <div class="prompt-item-desc">${prompt.description || 'No description'}</div>
                </div>
            `).join('');
        }

        async function selectPrompt(key) {
            // Warn if unsaved changes
            if (isDirty && !confirm('You have unsaved changes. Continue?')) {
                return;
            }

            try {
                const response = await fetch(`/prompts/${key}`);
                if (!response.ok) throw new Error('Prompt not found');

                currentPrompt = await response.json();
                originalText = currentPrompt.prompt_text;
                isDirty = false;

                renderEditor();
                updateActivePrompt(key);
            } catch (error) {
                showNotification(`Failed to load prompt: ${error.message}`, 'error');
                console.error('Error loading prompt:', error);
            }
        }

        function renderEditor() {
            const headerEl = document.getElementById('editorHeader');
            const contentEl = document.getElementById('editorContent');
            const keyEl = document.getElementById('promptKey');
            const descEl = document.getElementById('promptDesc');
            const updatedEl = document.getElementById('promptUpdated');

            headerEl.style.display = 'flex';
            keyEl.textContent = currentPrompt.key;
            descEl.textContent = currentPrompt.description || 'No description';

            if (currentPrompt.updated_at) {
                const date = new Date(currentPrompt.updated_at);
                updatedEl.textContent = ` • Updated ${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
            } else {
                updatedEl.textContent = '';
            }

            contentEl.innerHTML = `
                <textarea class="editor-textarea" id="promptText" placeholder="Enter prompt text...">${currentPrompt.prompt_text || ''}</textarea>
                <div class="char-count" id="charCount">${(currentPrompt.prompt_text || '').length} characters</div>
            `;

            const textArea = document.getElementById('promptText');
            textArea.addEventListener('input', handleTextChange);

            // Focus and move cursor to end
            textArea.focus();
            textArea.setSelectionRange(textArea.value.length, textArea.value.length);
        }

        function handleTextChange(e) {
            const newText = e.target.value;
            isDirty = newText !== originalText;

            document.getElementById('saveBtn').disabled = !isDirty;
            document.getElementById('charCount').textContent = `${newText.length} characters`;
        }

        function updateActivePrompt(key) {
            document.querySelectorAll('.prompt-item').forEach(item => {
                item.classList.toggle('active', item.dataset.key === key);
            });
        }

        async function savePrompt() {
            if (!currentPrompt || !isDirty) return;

            const textArea = document.getElementById('promptText');
            const newText = textArea.value;

            try {
                const response = await fetch(`/prompts/${currentPrompt.key}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt_text: newText
                    })
                });

                if (!response.ok) throw new Error('Update failed');

                originalText = newText;
                isDirty = false;
                document.getElementById('saveBtn').disabled = true;

                showNotification('Prompt saved successfully');

                // Refresh the prompt list to update timestamp
                await loadPrompts();
                await selectPrompt(currentPrompt.key);
            } catch (error) {
                showNotification(`Failed to save: ${error.message}`, 'error');
                console.error('Error saving prompt:', error);
            }
        }

        function revertChanges() {
            if (!currentPrompt) return;

            if (isDirty && !confirm('Discard all changes?')) {
                return;
            }

            document.getElementById('promptText').value = originalText;
            isDirty = false;
            document.getElementById('saveBtn').disabled = true;
            document.getElementById('charCount').textContent = `${originalText.length} characters`;
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Event listeners
        document.getElementById('saveBtn').addEventListener('click', savePrompt);
        document.getElementById('revertBtn').addEventListener('click', revertChanges);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 's') {
                e.preventDefault();
                if (!document.getElementById('saveBtn').disabled) {
                    savePrompt();
                }
            }
        });

        // Warn before leaving if there are unsaved changes
        window.addEventListener('beforeunload', (e) => {
            if (isDirty) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Initialize
        loadPrompts();
    </script>
</body>
</html>
